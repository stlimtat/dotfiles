[tools]
bun = "latest"
go = "latest"
"go:github.com/kunchenguid/treehouse" = "latest"
node = "lts"
"npm:chrome-devtools-axi" = "latest"
"npm:gh-axi" = "latest"
"npm:gnhf" = "latest"
python = "3.12"
uv = "latest"

[env]
_.python.venv = { create = false, path = ".venv", uv_create_args = [
  "--seed",
  "--system-site-packages",
] }
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }

[settings]
python.uv_venv_auto = "source"

[settings.npm]
package_manager = "bun"
