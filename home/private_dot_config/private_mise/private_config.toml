[tools]
bun = "latest"
node = "lts"
"npm:ccstatusline" = "latest"
pipx = "latest"
"pipx:code-review-graph" = "latest"
"pipx:mempalace" = "latest"
pnpm = "latest"
python = "3.12"
terraform = "latest"
terragrunt = "latest"
uv = "latest"

[env]
_.python.venv = { create = false, path = ".venv", uv_create_args = [
  "--seed",
  "--system-site-packages",
] }
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }

[settings]
python.uv_venv_auto = "source"

[settings.npm]
package_manager = "bun"
